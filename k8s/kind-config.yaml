# kind cluster configuration
# Disables default CNI so Calico can be installed (required for NetworkPolicy)
# Pinned to Kubernetes v1.31.14 (v1.35 has known issues with kind)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true   # disable kindnet so Calico takes over
  podSubnet: "192.168.0.0/16" # Calico's default CIDR
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
